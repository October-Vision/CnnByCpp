
<svg width="600" height="180" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="liquid" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#a18cd1">
          <animate attributeName="stop-color" values="#a18cd1;#fbc2eb;#a18cd1" dur="5s" repeatCount="indefinite" />
        </stop>
        <stop offset="100%" stop-color="#8fd3f4">
          <animate attributeName="stop-color" values="#8fd3f4;#84fab0;#8fd3f4" dur="5s" repeatCount="indefinite" />
        </stop>
      </linearGradient>

      <filter id="edge-glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="3" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
    </defs>

    <style>
      .glass-text {

        font-family: "Songti SC", "STSong", "KaiTi", serif;
        font-size: 76px;
        font-weight: 900;
        
        fill: rgba(255, 255, 255, 0.03); 
        stroke: url(#liquid);
        stroke-width: 1.5px;

        filter: url(#edge-glow);
        letter-spacing: 28px;
        
        animation: breath 4s ease-in-out infinite;
      }

      @keyframes breath {
        0%, 100% { opacity: 0.6; stroke-width: 1px; }
        50% { opacity: 1; stroke-width: 2.5px; filter: drop-shadow(0 0 15px rgba(143, 211, 244, 0.8)); }
      }
    </style>

    <text x="52%" y="55%" text-anchor="middle" dominant-baseline="middle" class="glass-text">
      凭栏听曲
    </text>
  </svg>